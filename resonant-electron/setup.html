<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonant — Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      color: #fff;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .subtitle a {
      color: #a78bfa;
      text-decoration: none;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 10px 12px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
      font-family: "Courier New", monospace;
    }

    input:focus {
      border-color: #a78bfa;
    }

    input::placeholder {
      color: #444;
    }

    button {
      width: 100%;
      background: #a78bfa;
      border: none;
      border-radius: 8px;
      color: #0d0d0d;
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }

    button:hover { background: #bba4fb; }
    button:active { background: #9370f5; }

    .error {
      font-size: 12px;
      color: #f87171;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Resonant</div>
    <p class="subtitle">
      Enter your LiveKit credentials to get started.<br />
      Get them from your <a href="https://cloud.livekit.io" target="_blank">LiveKit Cloud dashboard</a> under Settings → API Keys.
    </p>

    <label>LIVEKIT URL</label>
    <input id="url" type="text" placeholder="wss://your-project.livekit.cloud" />

    <label>API KEY</label>
    <input id="key" type="text" placeholder="APIxxxxxxxxxxxxxxxxx" />

    <label>API SECRET</label>
    <input id="secret" type="password" placeholder="••••••••••••••••••••••••" />

    <button onclick="save()">Launch Resonant</button>
    <p class="error" id="error">Please fill in all three fields.</p>
  </div>

  <script>
    function save() {
      const url = document.getElementById("url").value.trim();
      const key = document.getElementById("key").value.trim();
      const secret = document.getElementById("secret").value.trim();
      const error = document.getElementById("error");

      if (!url || !key || !secret) {
        error.style.display = "block";
        return;
      }

      error.style.display = "none";
      window.resonant.saveEnv({
        LIVEKIT_URL: url,
        LIVEKIT_API_KEY: key,
        LIVEKIT_API_SECRET: secret,
      });
    }
  </script>
</body>
</html>
